# Nginx config for easetraveler.net
# Place this file at: /etc/nginx/sites-available/easetraveler.net
# Then: ln -sf /etc/nginx/sites-available/easetraveler.net /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name easetraveler.net www.easetraveler.net;

    # Certbot will fill in the HTTPS redirect after running certbot --nginx
    root /var/www/easetraveler;
    index index.html;

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed assets (JS/CSS/images)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No caching for index.html so new deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
